[server]
hostname = "localhost"
node_ip = "127.0.0.1"
base_path = "https://$ref{server.hostname}:${carbon.management.port}"

[super_admin]
username = "admin"
password = "admin"
create_admin_account = true

[user_store]
type = "database_unique_id"

[database.identity_db]
type = "h2"
url = "jdbc:h2:./repository/database/WSO2IDENTITY_DB;DB_CLOSE_ON_EXIT=FALSE;LOCK_TIMEOUT=60000"
username = "wso2carbon"
password = "wso2carbon"

[database.shared_db]
type = "h2"
url = "jdbc:h2:./repository/database/WSO2SHARED_DB;DB_CLOSE_ON_EXIT=FALSE;LOCK_TIMEOUT=60000"
username = "wso2carbon"
password = "wso2carbon"

[keystore.primary]
file_name = "wso2carbon.p12"
password = "wso2carbon"
type="PKCS12"

[truststore]
file_name="client-truststore.p12"
password="wso2carbon"
type="PKCS12"

# Dynamic API resource access control configuration that causes the issue
# This configuration will make OPTIONS requests to SCIM2 Agents endpoint secured
# when they should remain unsecured according to the framework default
[[resource.access_control]]
context = "(.*/scim2/Agents.*)"
secure = true
http_method = "all"

# Additional resource access control to test the issue with API resources
[[resource.access_control]]
context = "(.*/api/server/v1/api-resources.*)"
secure = true
http_method = "all"

# Test configuration for a sample endpoint that should remain unsecured for testing
[[resource.access_control]]
context = "(.*/sample-test/.*)"
secure = false
http_method = "all"